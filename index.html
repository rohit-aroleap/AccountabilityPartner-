<!DOCTYPE html>
<!--
  Temporarily disabled (2026-06-12) — the AccountabilityPartner app
  subscribes to a single 25 MB blob at /accountabilityPartner in the
  shared motherofdashboard Firebase RTDB. With every page load
  re-downloading the whole blob (no IndexedDB persistence), it was
  responsible for the largest share of the project's monthly download
  cost (28.7 GB used / 10 GB Spark-plan cap, June 2026 billing period).

  To re-enable: `git revert <this commit>` and push. The original
  index.html + js/ + styles.css are untouched in git history; this
  page is the only file replaced.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accountability Partner — paused</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 60%, #e0e7ff 100%);
      color: #1f2937;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 460px;
      background: white;
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.10);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      color: #4c1d95;
    }
    p {
      margin: 8px 0;
      color: #4b5563;
      line-height: 1.55;
      font-size: 14px;
    }
    .icon {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">⏸</div>
    <h1>Accountability Partner is paused</h1>
    <p>The app is temporarily offline while we work on a more efficient way to load your accountability history.</p>
    <p>We'll bring it back as soon as the update is ready. No data has been lost.</p>
  </main>
</body>
</html>
